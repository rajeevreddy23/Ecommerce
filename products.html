<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Ecommerce — Products</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Minimal safe styles in case style.css is empty */
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, Arial, sans-serif; color: #222; background: #f7f7fb; }
    .nav { position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #111; color: #fff; }
    .nav a { color: #fff; text-decoration: none; margin-left: 12px; }
    .container { max-width: 1100px; margin: 20px auto; padding: 0 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    article.product { background: #fff; border: 1px solid #eee; border-radius: 12px; overflow: hidden; }
    article.product img { width: 100%; height: 160px; object-fit: cover; display: block; }
    article.product .p { padding: 10px 12px; }
    .price { color: #2ecc71; font-weight: 700; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin: 10px 0 18px; flex-wrap: wrap; }
    .toolbar input { height: 36px; padding: 0 10px; border: 1px solid #ddd; border-radius: 8px; min-width: 240px; }
    .toolbar .count { color: #666; font-size: 14px; }
  </style>
</head>
<body class="page-products">

  <!-- Shared navbar -->
  <nav class="nav">
    <div class="logo"><a href="index.html">Ecommerce</a></div>
    <div class="links">
      <a href="index.html">Index</a>
      <a href="home.html">Home</a>
      <a href="products.html" class="active">Products</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <main class="container">
    <header>
      <h1>Products</h1>
    </header>

    <!-- Search and count -->
    <div class="toolbar">
      <div class="count"><span id="count">0</span> items</div>
      <input id="q" type="search" placeholder="Search product name…" />
    </div>

    <!-- Grid container -->
    <section id="grid" class="grid" aria-label="Products grid"></section>
  </main>

  <footer style="text-align:center; color:#777; padding:16px;">© 2026 Ecommerce</footer>

  <script>
    // How many products to create:
    const COUNT = 80; // 👈 change to 120, 200, etc.

    // Small datasets to generate names:
    const adjectives = ["Classic", "Premium", "Sport", "Casual", "Eco", "Comfy", "Trendy", "Urban", "Slim", "Pro", "Air", "Flex", "Max"];
    const items = ["T‑Shirt", "Sneakers", "Backpack", "Watch", "Headphones", "Jeans", "Kurta", "Saree", "Hoodie", "Jacket", "Sunglasses", "Cap", "Wallet"];
    const colors = ["Black", "Blue", "Navy", "Red", "Green", "White", "Grey", "Olive", "Beige", "Maroon"];
    const brands = ["ValuePro", "SwiftGear", "UrbanFit", "StyleNest", "PrimeWear", "Budgetify"];

    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const price = (min, max) => Math.floor(min + Math.random() * (max - min + 1));
    const rating = () => (Math.random() * 1.5 + 3.5).toFixed(1); // 3.5 – 5.0

    const products = Array.from({ length: COUNT }, (_, i) => {
      const name = `${rand(adjectives)} ${rand(colors)} ${rand(items)}`;
      return {
        id: i + 1,
        name,
        brand: rand(brands),
        rating: rating(),
        price: price(299, 4999),
        image: `https://picsum.photos/seed/${i+1}/400/300` // placeholder image
      };
    });

    const grid = document.getElementById('grid');
    const countEl = document.getElementById('count');
    const q = document.getElementById('q');

    function render(list) {
      countEl.textContent = list.length;
      grid.innerHTML = list.map(p => `
        <article class="product" data-name="${p.name.toLowerCase()}">
          <img src="${p.image}" alt="${p.name}" loading="lazy">
          <div class="p">
            <h3>${p.name}</h3>
            <div style="font-size:12px;color:#777">${p.brand} • ⭐ ${p.rating}</div>
            <div class="price">₹${p.price.toLocaleString('en-IN')}</div>
            <div style="margin-top:8px; display:flex; gap:8px;">
              <a class="btn" href="#" style="flex:1; text-align:center; background:#6c5ce7; color:#fff; padding:8px 10px; border-radius:8px;">View</a>
              <button type="button" style="flex:1; padding:8px 10px; border:1px solid #ddd; border-radius:8px; background:#fff; cursor:pointer;">Add</button>
            </div>
          </div>
        </article>
      `).join('');
    }

    // Initial render
    render(products);

    // Simple live search
    q.addEventListener('input', () => {
      const term = q.value.trim().toLowerCase();
      if (!term) return render(products);
      const filtered = products.filter(p => p.name.toLowerCase().includes(term));
      render(filtered);
    });
  </script>
</body>
</html>
